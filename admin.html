<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>客服工作台</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f0f0f0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* 模拟桌面背景色，让主窗口凸显 */
            background-image: linear-gradient(135deg, #e0e0e0 0%, #cfcfcf 100%); 
        }

        /* 主体窗口 */
        .chat-container {
            display: flex;
            width: 1000px;
            height: 720px;
            max-width: 95vw;
            max-height: 95vh;
            background: #fff;
            border-radius: 4px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            overflow: hidden;
            border: 1px solid #dcdcdc;
        }

        /* 1. 最左侧导航栏 */
        .nav-sidebar {
            width: 60px;
            background-color: #2e2e2e; /* 经典深色导航栏，也可改成图片中的浅色 */
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            position: relative;
        }

        .nav-avatar {
            width: 40px;
            height: 40px;
            border-radius: 4px;
            background-color: #fff;
            margin-bottom: 20px;
            /* 占位头像 */
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23ccc"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg>');
            background-size: cover;
        }

        .nav-icon {
            width: 28px;
            height: 28px;
            margin-bottom: 25px;
            cursor: pointer;
            fill: #8a8a8a;
            transition: fill 0.2s;
        }

        .nav-icon.active {
            fill: #07c160; /* 选中状态为绿色 */
        }

        .nav-icon:hover {
            fill: #dcdcdc;
        }

        .nav-bottom {
            position: absolute;
            bottom: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 2. 中间会话列表栏 */
        .contact-sidebar {
            width: 260px;
            background-color: #dfdfdf;
            border-right: 1px solid #d6d6d6;
            display: flex;
            flex-direction: column;
        }

        .search-area {
            height: 60px;
            padding: 15px 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .search-box {
            background-color: #cecece;
            border-radius: 4px;
            height: 26px;
            display: flex;
            align-items: center;
            padding: 0 10px;
            flex: 1;
        }

        .search-box input {
            border: none;
            background: transparent;
            outline: none;
            font-size: 12px;
            width: 100%;
            margin-left: 5px;
        }

        .add-btn {
            width: 26px;
            height: 26px;
            background-color: #cecece;
            border-radius: 4px;
            margin-left: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 18px;
            color: #555;
        }

        .user-list {
            flex: 1;
            overflow-y: auto;
        }

        .user-item {
            padding: 12px;
            display: flex;
            align-items: center;
            cursor: pointer;
            position: relative;
        }

        .user-item:hover {
            background-color: #c8c8c8;
        }

        .user-item.active {
            background-color: #c3c3c3;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 4px;
            background-color: #1aad19;
            margin-right: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 16px;
            flex-shrink: 0;
        }

        .user-info {
            flex: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 38px;
        }

        .user-name-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .user-name {
            font-size: 14px;
            color: #333;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .user-time {
            font-size: 12px;
            color: #999;
        }

        .user-last-msg {
            font-size: 12px;
            color: #999;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .unread-badge {
            background-color: #f43530;
            color: white;
            border-radius: 50%;
            font-size: 12px;
            min-width: 16px;
            height: 16px;
            text-align: center;
            line-height: 16px;
            padding: 0 4px;
            position: absolute;
            left: 42px;
            top: 6px;
        }

        /* 3. 右侧聊天主区域 */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: #f5f5f5;
            position: relative;
        }

        .header {
            height: 60px;
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #e7e7e7;
        }

        .header-title {
            font-size: 20px;
            color: #333;
            font-weight: 400;
        }

        .window-controls {
            display: flex;
            gap: 15px;
            color: #888;
            font-size: 16px;
            cursor: pointer;
        }
        
        .window-controls span:hover {
            color: #333;
        }

        .messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        .message {
            margin-bottom: 20px;
            display: flex;
            align-items: flex-start;
        }

        .message.received {
            flex-direction: row;
        }

        .message.sent {
            flex-direction: row-reverse;
        }

        .msg-avatar {
            width: 36px;
            height: 36px;
            border-radius: 4px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }

        .message.received .msg-avatar {
            background-color: #ccc;
            margin-right: 15px;
        }

        .message.sent .msg-avatar {
            background-color: #1aad19;
            margin-left: 15px;
        }

        .message-content {
            max-width: 65%;
            padding: 10px 15px;
            border-radius: 4px;
            font-size: 14px;
            line-height: 1.5;
            position: relative;
            word-break: break-all;
        }

        .message.received .message-content {
            background-color: #fff;
            color: #333;
        }

        .message.received .message-content::before {
            content: '';
            position: absolute;
            left: -6px;
            top: 12px;
            border-top: 6px solid transparent;
            border-bottom: 6px solid transparent;
            border-right: 6px solid #fff;
        }

        .message.sent .message-content {
            background-color: #9eea6a;
            color: #333;
        }

        .message.sent .message-content::before {
            content: '';
            position: absolute;
            right: -6px;
            top: 12px;
            border-top: 6px solid transparent;
            border-bottom: 6px solid transparent;
            border-left: 6px solid #9eea6a;
        }

        /* 底部输入区 */
        .input-area {
            height: 160px;
            border-top: 1px solid #ececec;
            background-color: #f5f5f5;
            display: flex;
            flex-direction: column;
        }

        .toolbar {
            height: 40px;
            padding: 0 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .tool-icon {
            width: 20px;
            height: 20px;
            fill: #666;
            cursor: pointer;
        }
        
        .tool-icon:hover {
            fill: #333;
        }

        .input-box {
            flex: 1;
            padding: 0 20px;
        }

        .input-box textarea {
            width: 100%;
            height: 100%;
            border: none;
            resize: none;
            outline: none;
            font-size: 14px;
            font-family: inherit;
            background: transparent;
            color: #333;
        }

        .action-area {
            height: 50px;
            padding: 0 20px 15px;
            display: flex;
            justify-content: flex-end;
            align-items: center;
        }

        .send-btn {
            padding: 6px 24px;
            background-color: #e9e9e9;
            border: 1px solid #e1e1e1;
            border-radius: 4px;
            color: #07c160;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .send-btn:hover {
            background-color: #d2d2d2;
        }

        /* 滚动条美化 */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-thumb {
            background-color: #c3c3c3;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-track {
            background-color: transparent;
        }

        /* 未选中状态遮罩 */
        #emptyState {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
        #emptyState.hidden {
            display: none;
        }
        .icon-wechat-empty {
            width: 100px;
            height: 100px;
            fill: #e0e0e0;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="nav-sidebar">
            <div class="nav-avatar"></div>
            <svg class="nav-icon active" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg"><path d="M512 128c-203.2 0-368 141.1-368 315.2 0 98.7 51.5 186.7 132.8 243.6L240 848l112.9-56.1c48.6 17.5 101.9 27.3 159.1 27.3 203.2 0 368-141.1 368-315.2S715.2 128 512 128z"/></svg>
            <svg class="nav-icon" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg"><path d="M682.7 554.7c64-42.7 106.7-115.2 106.7-192 0-132.3-107.7-240-240-240s-240 107.7-240 240c0 76.8 42.7 149.3 106.7 192C256 605.9 128 733.9 128 896h85.3c0-141.4 114.6-256 256-256h85.3c141.4 0 256 114.6 256 256H896c0-162.1-128-290.1-288-341.3zM549.3 544h-85.3c-94.3 0-170.7-76.4-170.7-170.7S369.7 202.7 464 202.7 634.7 279 634.7 373.3 558.3 544 549.3 544z"/></svg>
            <svg class="nav-icon" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg"><path d="M922 368.6c-4.8-14.8-17.6-25.2-33-27.4L663 308.5l-101.1-205c-6.8-13.8-20.7-22.5-36.1-22.5s-29.3 8.7-36.1 22.5L388.5 308.6 162.6 341.5c-15.4 2.2-28.1 12.6-33 27.4s-.3 31.4 10.9 42.2l163.5 159.4-38.6 225.2c-2.6 15.3 3.6 30.7 16.2 39.8 12.6 9.1 29.4 9.9 42.8 2.2l202.2-106.3 202.2 106.3c6 3.1 12.7 4.7 19.3 4.7 8.3 0 16.5-2.3 23.4-6.9 12.6-9.1 18.8-24.5 16.2-39.8l-38.6-225.2 163.5-159.4c11.1-10.8 15.7-25.9 10.8-40.7z"/></svg>
            
            <div class="nav-bottom">
                <svg class="nav-icon" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg"><path d="M725.3 128H298.7C251.7 128 213.3 166.4 213.3 213.3v597.3C213.3 857.6 251.7 896 298.7 896h426.7C772.3 896 810.7 857.6 810.7 810.7V213.3C810.7 166.4 772.3 128 725.3 128zM512 832c-23.6 0-42.7-19.1-42.7-42.7s19.1-42.7 42.7-42.7 42.7 19.1 42.7 42.7S535.6 832 512 832z m213.3-170.7H298.7V213.3h426.7v448z"/></svg>
                <svg class="nav-icon" style="margin-bottom:0;" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg"><path d="M170.7 597.3c-47.1 0-85.3-38.2-85.3-85.3s38.2-85.3 85.3-85.3 85.3 38.2 85.3 85.3-38.2 85.3-85.3 85.3zM512 597.3c-47.1 0-85.3-38.2-85.3-85.3s38.2-85.3 85.3-85.3 85.3 38.2 85.3 85.3-38.2 85.3-85.3 85.3zM853.3 597.3c-47.1 0-85.3-38.2-85.3-85.3s38.2-85.3 85.3-85.3 85.3 38.2 85.3 85.3-38.2 85.3-85.3 85.3z"/></svg>
            </div>
        </div>

        <div class="contact-sidebar">
            <div class="search-area">
                <div class="search-box">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="#888"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                    <input type="text" placeholder="搜索">
                </div>
                <div class="add-btn">+</div>
            </div>
            <div class="user-list" id="userList">
                </div>
        </div>

        <div class="main-content">
            <div id="emptyState">
                <svg class="icon-wechat-empty" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
                    <path d="M699.23 358.38c0-112.98-111.95-204.58-250.04-204.58-138.1 0-250.03 91.6-250.03 204.58 0 63.85 35.8 120.67 91.35 157.9l-28.73 85.3 100.94-51.04c27.15 7.64 56.12 11.85 86.47 11.85 138.08 0 250.04-91.6 250.04-204.01zM483.74 582.5c-20.08 0-39.5-2.22-58.12-6.33l-71.18 36.03 20.25-60.14C335.54 525.68 310.4 485.87 310.4 441.2c0-79.67 78.96-144.25 176.35-144.25 97.4 0 176.36 64.58 176.36 144.25 0 79.67-78.96 144.3-179.37 141.3z"/>
                </svg>
            </div>

            <div class="header">
                <div class="header-title" id="currentUserName">请选择一个会话</div>
                <div class="window-controls">
                    <span onclick="clearMessages()" title="清空记录">🗑️</span>
                    <span>─</span>
                    <span>□</span>
                    <span>✕</span>
                </div>
            </div>

            <div class="messages" id="messageArea"></div>

            <div class="input-area">
                <div class="toolbar">
                    <svg class="tool-icon" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm3.5-9c.83 0 1.5-.67 1.5-1.5S16.33 8 15.5 8 14 8.67 14 9.5s.67 1.5 1.5 1.5zm-7 0c.83 0 1.5-.67 1.5-1.5S9.33 8 8.5 8 7 8.67 7 9.5 7.67 11 8.5 11zm3.5 6.5c2.33 0 4.31-1.46 5.11-3.5H6.89c.8 2.04 2.78 3.5 5.11 3.5z"/></svg>
                    <svg class="tool-icon" viewBox="0 0 24 24"><path d="M20 6h-8l-2-2H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm0 12H4V8h16v10z"/></svg>
                    <svg class="tool-icon" viewBox="0 0 24 24"><path d="M9.5 6.5v3h-3v-3h3M11 5H5v6h6V5zm-1.5 9.5v3h-3v-3h3M11 13H5v6h6v-6zm6.5-6.5v3h-3v-3h3M19 5h-6v6h6V5zm-6 8h1.5v1.5H13V13zm1.5 1.5H16V16h-1.5v-1.5zM16 13h1.5v1.5H16V13zm-1.5 3H16v1.5h-1.5V16zM16 16h1.5v1.5H16V16zm1.5-1.5H19V16h-1.5v-1.5zM19 16h1.5v1.5H19V16zm-1.5 1.5H19v1.5h-1.5v-1.5z"/></svg>
                </div>
                <div class="input-box">
                    <textarea id="messageInput" placeholder="输入消息..." onkeypress="handleKeyPress(event)"></textarea>
                </div>
                <div class="action-area">
                    <button class="send-btn" onclick="sendMessage()">发送(S)</button>
                </div>
            </div>
        </div>
    </div>

    <audio id="notificationSound" src="/files/preview.mp3" preload="auto"></audio>

    <script>
        // WebSocket 变量
        let socket;
        let currentUserId = null;
        let users = [];
        let messages = {};

        function initWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            socket = new WebSocket(`${protocol}//${window.location.host}/ws/admin`);

            socket.onopen = () => console.log('已连接到 WebSocket 服务器');

            socket.onmessage = (event) => {
                const data = JSON.parse(event.data);
                handleMessage(data);
            };

            socket.onclose = () => {
                console.log('与 WebSocket 服务器断开连接，3秒后重连...');
                setTimeout(initWebSocket, 3000);
            };
        }

        function playNotificationSound() {
            const audio = document.getElementById('notificationSound');
            audio.play().catch(error => console.error("无法播放提示音", error));
        }

        function handleMessage(data) {
            if (data.type === 'init') {
                users = data.users;
                renderUserList();
            } else if (data.type === 'user_connected') {
                if (!users.find(u => u.id === data.userId)) {
                    users.push({ id: data.userId, unread: 0 });
                }
                renderUserList();
            } else if (data.type === 'user_disconnected') {
                // 处理离线
            } else if (data.type === 'message') {
                const userId = data.userId;
                if (!messages[userId]) messages[userId] = [];
                messages[userId].push(data);

                if (currentUserId === userId) {
                    renderMessages();
                    scrollToBottom();
                } else {
                    const user = users.find(u => u.id === userId);
                    if (user) {
                        user.unread = (user.unread || 0) + 1;
                        renderUserList();
                    }
                }
                playNotificationSound();
            }
        }

        function renderUserList() {
            const userListEl = document.getElementById('userList');
            userListEl.innerHTML = '';

            users.forEach(user => {
                const msgs = messages[user.id] || [];
                const lastMsg = msgs.length > 0 ? msgs[msgs.length - 1].content : '新会话...';
                
                // 模拟时间
                const date = new Date();
                const timeStr = `${date.getHours().toString().padStart(2,'0')}:${date.getMinutes().toString().padStart(2,'0')}`;

                const el = document.createElement('div');
                el.className = `user-item ${currentUserId === user.id ? 'active' : ''}`;
                el.onclick = () => selectUser(user.id);
                
                const initial = user.id.substring(0, 1).toUpperCase();

                el.innerHTML = `
                    <div class="user-avatar">${initial}</div>
                    ${user.unread ? `<div class="unread-badge">${user.unread}</div>` : ''}
                    <div class="user-info">
                        <div class="user-name-row">
                            <span class="user-name">客户 ${user.id.substring(0, 6)}</span>
                            <span class="user-time">${timeStr}</span>
                        </div>
                        <div class="user-last-msg">${lastMsg}</div>
                    </div>
                `;
                userListEl.appendChild(el);
            });
        }

        function selectUser(userId) {
            currentUserId = userId;
            const user = users.find(u => u.id === userId);
            if (user) user.unread = 0;
            
            document.getElementById('emptyState').classList.add('hidden');
            document.getElementById('currentUserName').innerText = `客户 ${userId}`;
            
            renderUserList();
            renderMessages();
            scrollToBottom();
            document.getElementById('messageInput').focus();
        }

        function renderMessages() {
            const messageArea = document.getElementById('messageArea');
            messageArea.innerHTML = '';

            if (currentUserId && messages[currentUserId]) {
                messages[currentUserId].forEach(msg => {
                    const isAdmin = msg.role === 'admin';
                    const el = document.createElement('div');
                    el.className = `message ${isAdmin ? 'sent' : 'received'}`;
                    
                    const avatarStr = isAdmin ? '我' : '客';
                    el.innerHTML = `
                        <div class="msg-avatar">${avatarStr}</div>
                        <div class="message-content">${msg.content}</div>
                    `;
                    messageArea.appendChild(el);
                });
            }
        }

        function scrollToBottom() {
            const messageArea = document.getElementById('messageArea');
            messageArea.scrollTop = messageArea.scrollHeight;
        }

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const content = input.value.trim();

            if (!content || !currentUserId) return;

            const msgData = { type: 'message', userId: currentUserId, content: content, role: 'admin' };
            socket.send(JSON.stringify(msgData));

            if (!messages[currentUserId]) messages[currentUserId] = [];
            messages[currentUserId].push(msgData);

            input.value = '';
            renderMessages();
            scrollToBottom();
            renderUserList();
        }

        function clearMessages() {
            if (currentUserId && confirm('确定要清空与该客户的聊天记录吗？')) {
                messages[currentUserId] = [];
                renderMessages();
                renderUserList();
            }
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        window.onload = initWebSocket;
    </script>
</body>
</html>
